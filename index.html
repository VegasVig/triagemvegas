<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vegas Vigilância — Painel de Candidatos</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:        #080808;
    --surface:   #111111;
    --card:      #161616;
    --card-hi:   #1c1c1c;
    --border:    #2a2a2a;
    --silver:    #c8c8c8;
    --silver-dim:#888888;
    --white:     #f0f0f0;
    --ok:        #55b87a;
    --ok-bg:     #081208;
    --ok-border: #2a5a2a;
    --danger:    #e08888;
    --danger-strong: #e05555;
    --danger-bg: #1a0f0f;
    --danger-border: #5a2020;
    --warn:      #d9a441;
    --grad: linear-gradient(135deg, #3a3a3a 0%, #909090 50%, #3a3a3a 100%);
    --grad-danger: linear-gradient(135deg, #4a1f1f 0%, #b85050 50%, #4a1f1f 100%);
  }
  html, body { background: var(--bg); color: var(--silver); font-family:'Inter',sans-serif; min-height:100vh; }
  .wrap { max-width: 1320px; margin: 0 auto; padding: 2.5rem 2rem 4rem; }

  /* ---------- LOGIN ---------- */
  #loginScreen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(circle at 50% 20%, #161616 0%, #080808 70%);
    padding: 1.5rem;
  }
  .login-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 2.6rem 2.4rem 2.2rem;
    width: 100%;
    max-width: 360px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .login-box::before { content:''; position:absolute; left:0; top:0; right:0; height:2px; background:var(--grad); }
  .login-logo { max-width: 190px; max-height: 120px; object-fit: contain; margin: 0 auto 1.4rem; display:block; }
  .login-box .eyebrow { justify-content:center; display:flex; }
  .login-box h1 { font-size: 1.4rem; margin-bottom: 1.6rem; }
  .login-box input {
    width: 100%; background:#0d0d0d; border:1px solid var(--border); color:var(--white);
    font-size:13.5px; padding:.75rem .9rem; border-radius:4px; margin-bottom:.9rem; font-family:'Inter',sans-serif;
  }
  .login-box input:focus { outline:none; border-color:#777; }
  .login-box .btn { width:100%; padding:.75rem; font-size:13.5px; margin-top:.3rem; }
  .login-error { color: var(--danger-strong); font-size: 12px; margin-top: .8rem; min-height: 14px; }
  #dashboard { display: none; }

  header { display:flex; justify-content:space-between; align-items:flex-end; flex-wrap:wrap; gap:1.5rem; margin-bottom:2rem; padding-bottom:1.5rem; border-bottom:1px solid var(--border); position:relative; }
  header::before { content:''; position:absolute; left:0; bottom:-1px; width:120px; height:2px; background:var(--grad); }
  .brand { display:flex; align-items:center; gap:1rem; }
  .brand img { height: 46px; width: auto; object-fit: contain; }
  .eyebrow { font-family:'Rajdhani',sans-serif; font-size:11px; letter-spacing:3px; text-transform:uppercase; color:var(--silver-dim); margin-bottom:.3rem; }
  h1 { font-family:'Rajdhani',sans-serif; font-size:2.1rem; font-weight:700; color:var(--white); }

  .conn { display:flex; gap:.6rem; align-items:center; justify-content:flex-end; }
  .btn { font-family:'Rajdhani',sans-serif; font-weight:700; letter-spacing:1px; text-transform:uppercase; font-size:13px; padding:.6rem 1.2rem; border-radius:4px; border:none; cursor:pointer; background:var(--grad); color:#000; transition:filter .15s; }
  .btn:hover { filter:brightness(1.15); }
  .btn.ghost { background:transparent; border:1px solid var(--border); color:var(--silver-dim); }
  .btn.ghost:hover { color:var(--white); border-color:#666; filter:none; }
  .status { font-size:11.5px; color:var(--silver-dim); margin-top:.4rem; text-align:right; }
  .status.err { color:var(--danger-strong); }
  .status.ok { color:var(--ok); }

  /* ---------- KPIs ---------- */
  .kpis { display:grid; grid-template-columns:repeat(auto-fit,minmax(190px,1fr)); gap:1rem; margin-bottom:2rem; }
  .kpi { background:var(--card); border:1px solid var(--border); border-radius:6px; padding:1.2rem 1.3rem; position:relative; overflow:hidden; }
  .kpi::before { content:''; position:absolute; left:0; top:0; bottom:0; width:2px; background:var(--grad); }
  .kpi.flag::before { background: var(--grad-danger); }
  .kpi-num { font-family:'Rajdhani',sans-serif; font-size:2.1rem; font-weight:700; color:var(--white); line-height:1; }
  .kpi.flag .kpi-num { color: var(--danger); }
  .kpi-label { font-size:11px; letter-spacing:.5px; text-transform:uppercase; color:var(--silver-dim); margin-top:.5rem; }

  /* ---------- TOOLBAR ---------- */
  .toolbar { display:flex; flex-wrap:wrap; gap:.7rem; align-items:center; margin-bottom:1.4rem; }
  .toolbar input[type="text"], .toolbar select {
    background:var(--card); border:1px solid var(--border); color:var(--silver);
    font-size:12.5px; padding:.6rem .85rem; border-radius:4px; font-family:'Inter',sans-serif;
  }
  .toolbar input[type="text"] { flex:1; min-width:200px; }
  .toolbar input:focus, .toolbar select:focus { outline:none; border-color:#666; }
  .toolbar .spacer { flex:1; }
  .view-toggle { display:flex; border:1px solid var(--border); border-radius:4px; overflow:hidden; }
  .view-toggle button { background:var(--card); border:none; color:var(--silver-dim); font-size:11.5px; font-family:'Rajdhani',sans-serif; font-weight:700; letter-spacing:1px; text-transform:uppercase; padding:.55rem 1rem; cursor:pointer; }
  .view-toggle button.active { background:var(--grad); color:#000; }

  /* ---------- CANDIDATE CARDS ---------- */
  .card-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:1rem; margin-bottom:2rem; }

  .ccard {
    background:var(--card); border:1px solid var(--border); border-radius:8px;
    padding:1.2rem 1.3rem; cursor:pointer; transition:border-color .15s, transform .15s, background .15s;
    position:relative; display:flex; flex-direction:column; gap:.8rem;
  }
  .ccard:hover { border-color:#666; background:var(--card-hi); transform:translateY(-2px); }
  .ccard.risk { border-color: var(--danger-border); }
  .ccard.risk:hover { border-color: var(--danger-strong); }

  .ccard-top { display:flex; align-items:flex-start; gap:.85rem; }
  .avatar {
    flex-shrink:0; width:42px; height:42px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-family:'Rajdhani',sans-serif; font-weight:700; font-size:15px; color:#000;
    background:var(--grad);
  }
  .ccard.risk .avatar { background: var(--grad-danger); color:#fff; }
  .ccard-name { color:var(--white); font-size:14.5px; font-weight:600; line-height:1.3; }
  .ccard-vaga { font-size:11.5px; color:var(--silver-dim); margin-top:.15rem; }

  .risk-pill {
    margin-left:auto; flex-shrink:0; font-family:'Rajdhani',sans-serif; font-size:11px; font-weight:700;
    letter-spacing:.5px; text-transform:uppercase; padding:.25rem .6rem; border-radius:20px; white-space:nowrap;
  }
  .risk-pill.high { background:var(--danger-bg); color:var(--danger); border:1px solid var(--danger-border); }
  .risk-pill.clear { background:var(--ok-bg); color:var(--ok); border:1px solid var(--ok-border); }

  .ccard-meta { font-size:12px; color:var(--silver-dim); display:flex; flex-direction:column; gap:.25rem; }
  .ccard-meta span b { color:var(--silver); font-weight:500; }

  .chip-row { display:flex; flex-wrap:wrap; gap:.4rem; }
  .chip {
    font-size:10.5px; padding:.2rem .55rem; border-radius:4px; background:var(--danger-bg);
    color:var(--danger); border:1px solid var(--danger-border); font-weight:500;
  }
  .chip.ok { background:var(--ok-bg); color:var(--ok); border-color:var(--ok-border); }

  /* ---------- EMPTY ---------- */
  .empty { text-align:center; padding:3rem 1rem; color:var(--silver-dim); font-size:13.5px; line-height:1.8; }
  .empty b { color:var(--white); }

  /* ---------- MODAL ---------- */
  .modal-backdrop {
    display:none; position:fixed; inset:0; background:rgba(0,0,0,.72); backdrop-filter: blur(2px);
    z-index:100; align-items:flex-start; justify-content:center; padding:3.5rem 1.2rem;
    overflow-y:auto;
  }
  .modal-backdrop.open { display:flex; }
  .modal {
    background:var(--surface); border:1px solid var(--border); border-radius:10px;
    max-width:760px; width:100%; position:relative; overflow:hidden;
    animation: modalIn .2s ease;
  }
  @keyframes modalIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }
  .modal::before { content:''; position:absolute; left:0; top:0; right:0; height:3px; background:var(--grad); }
  .modal.risk::before { background:var(--grad-danger); }

  .modal-head { padding:1.8rem 2rem 1.4rem; border-bottom:1px solid var(--border); display:flex; gap:1.1rem; align-items:flex-start; }
  .modal-head .avatar { width:54px; height:54px; font-size:19px; }
  .modal-head h2 { font-family:'Rajdhani',sans-serif; font-size:1.5rem; color:var(--white); font-weight:700; line-height:1.2; }
  .modal-head .sub { font-size:12.5px; color:var(--silver-dim); margin-top:.3rem; }
  .modal-close {
    margin-left:auto; background:transparent; border:1px solid var(--border); color:var(--silver-dim);
    width:32px; height:32px; border-radius:50%; cursor:pointer; font-size:16px; line-height:1; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
  }
  .modal-close:hover { color:var(--white); border-color:#666; }

  .modal-body { padding:1.6rem 2rem 2.2rem; max-height:72vh; overflow-y:auto; }

  .section-label { font-family:'Rajdhani',sans-serif; font-size:12px; letter-spacing:2px; text-transform:uppercase; color:var(--silver-dim); margin:1.6rem 0 .8rem; display:flex; align-items:center; gap:.6rem; }
  .section-label:first-child { margin-top:0; }
  .section-label::after { content:''; flex:1; height:1px; background:var(--border); }

  .attn-box {
    border-radius:6px; padding:.85rem 1rem; margin-bottom:.65rem; font-size:13px; line-height:1.55;
    display:flex; gap:.7rem; align-items:flex-start;
  }
  .attn-box.flag { background:var(--danger-bg); border:1px solid var(--danger-border); }
  .attn-box.safe { background:var(--ok-bg); border:1px solid var(--ok-border); }
  .attn-icon { flex-shrink:0; font-size:15px; margin-top:1px; }
  .attn-title { font-weight:600; margin-bottom:.15rem; }
  .attn-box.flag .attn-title { color:var(--danger); }
  .attn-box.safe .attn-title { color:var(--ok); }
  .attn-note { color:var(--silver-dim); font-size:12px; }

  .info-grid { display:grid; grid-template-columns:1fr 1fr; gap:.9rem 1.4rem; }
  .info-item .k { font-size:10.5px; letter-spacing:.5px; text-transform:uppercase; color:var(--silver-dim); margin-bottom:.2rem; }
  .info-item .v { font-size:13.5px; color:var(--white); }
  .info-item.full { grid-column:1 / -1; }

  .obs-box { background:#141414; border:1px solid var(--border); border-radius:6px; padding:.9rem 1rem; font-size:13px; color:var(--silver); line-height:1.6; margin-top:.4rem; }

  @media (max-width:600px) {
    .info-grid { grid-template-columns:1fr; }
    .modal-body { padding:1.4rem 1.2rem 1.8rem; }
    .modal-head { padding:1.4rem 1.2rem 1.1rem; }
  }
</style>
</head>
<body>

<!-- ================= LOGIN ================= -->
<div id="loginScreen">
  <div class="login-box">
    <img src="assets/logovegas.png" alt="Vegas Vigilância" class="login-logo" />
    <p class="eyebrow">Vegas Vigilância &amp; Segurança</p>
    <h1>Painel de Candidatos</h1>
    <input id="loginUser" type="text" placeholder="Usuário" autocomplete="username" />
    <input id="loginPass" type="password" placeholder="Senha" autocomplete="current-password" />
    <button class="btn" onclick="tryLogin()">Entrar</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- ================= DASHBOARD ================= -->
<div id="dashboard">
  <div class="wrap">
    <header>
      <div class="brand">
        <img src="assets/logovegas.png" alt="Vegas Vigilância" onerror="this.style.display='none'" />
        <div>
          <p class="eyebrow">Vegas Vigilância &amp; Segurança</p>
          <h1>Painel de Candidatos</h1>
        </div>
      </div>
      <div>
        <div class="conn">
          <button class="btn" onclick="loadData()">Atualizar</button>
          <button class="btn ghost" onclick="logout()">Sair</button>
        </div>
        <div class="status" id="status">Carregando dados...</div>
      </div>
    </header>

    <div id="content">
      <div class="empty">
        <b>Carregando candidatos...</b>
      </div>
    </div>
  </div>
</div>

<!-- ================= MODAL DETALHE ================= -->
<div class="modal-backdrop" id="modalBackdrop" onclick="if(event.target===this) closeModal()">
  <div class="modal" id="modalBox">
    <div class="modal-head">
      <div class="avatar" id="modalAvatar">—</div>
      <div>
        <h2 id="modalName">—</h2>
        <div class="sub" id="modalSub">—</div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
/* ---------- CONFIG ---------- */
const API_URL = 'https://script.google.com/macros/s/AKfycbxcgWZHh4Da_kJ1iIMI-Wql8bLV20nVocLVW2Mv2qXRZ0m1996hxf8xd8bSQQ9SHZN4/exec';
const AUTH_USER = 'vegas';
const AUTH_PASS = 'Vegas4747@!';
const SESSION_KEY = 'vegas_painel_auth';

/* ---------- LOGIN ---------- */
function tryLogin() {
  const user = document.getElementById('loginUser').value.trim();
  const pass = document.getElementById('loginPass').value;
  const errEl = document.getElementById('loginError');

  if (user === AUTH_USER && pass === AUTH_PASS) {
    errEl.textContent = '';
    sessionStorage.setItem(SESSION_KEY, '1');
    showDashboard();
  } else {
    errEl.textContent = 'Usuário ou senha incorretos.';
  }
}

document.getElementById('loginPass').addEventListener('keydown', e => {
  if (e.key === 'Enter') tryLogin();
});
document.getElementById('loginUser').addEventListener('keydown', e => {
  if (e.key === 'Enter') tryLogin();
});

function logout() {
  sessionStorage.removeItem(SESSION_KEY);
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
}

function showDashboard() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  loadData();
}

// Sessão já autenticada nesta aba
if (sessionStorage.getItem(SESSION_KEY) === '1') {
  showDashboard();
}

/* ---------- DADOS ---------- */
let candidatos = [];
let currentSort = 'risk';
let currentQuery = '';
let currentVagaFilter = '';
let currentRiskFilter = '';

async function loadData() {
  const statusEl = document.getElementById('status');
  statusEl.textContent = 'Carregando...';
  statusEl.className = 'status';

  try {
    const res = await fetch(API_URL);
    const data = await res.json();
    candidatos = data.candidatos || [];
    statusEl.textContent = `${candidatos.length} candidato(s) carregado(s) com sucesso.`;
    statusEl.className = 'status ok';
    render();
  } catch (err) {
    statusEl.textContent = 'Erro ao carregar dados. Verifique se o App da Web está publicado para "Qualquer pessoa".';
    statusEl.className = 'status err';
    console.error(err);
  }
}

/* ---------- PONTOS DE ATENÇÃO ---------- */
// Mesma lógica de conformidade do formulário de cadastro (index.html),
// reaproveitada aqui para destacar, candidato a candidato, o que merece
// atenção da equipe de recrutamento antes da contratação.
function getAttentionItems(c) {
  return [
    {
      label: 'Antecedentes criminais',
      value: c.antecedentes || '—',
      attention: (c.antecedentes || '') === 'Sim',
      flagNote: 'Declarou possuir antecedentes criminais. Reforçar verificação documental antes de avançar na contratação.',
      okNote: 'Nenhum antecedente criminal declarado.'
    },
    {
      label: 'Obrigações militares',
      value: c.militar || '—',
      attention: (c.militar || '') === 'Não',
      flagNote: 'Não está em dia com as obrigações militares. Documento pode precisar ser regularizado antes da contratação.',
      okNote: 'Situação militar em dia ou não aplicável.'
    },
    {
      label: 'Limitação física',
      value: c.limitacao || '—',
      attention: (c.limitacao || '') === 'Sim',
      flagNote: 'Relatou limitação física para permanecer em pé por longos períodos. Avaliar compatibilidade com o posto antes de alocar.',
      okNote: 'Nenhuma limitação física relatada.'
    },
    {
      label: 'Mobilidade de posto',
      value: c.mobilidade || '—',
      attention: (c.mobilidade || '') === 'Não',
      flagNote: 'Não tem disponibilidade para mudar de posto. Pode limitar as opções de alocação da equipe.',
      okNote: 'Disponível para mudança de posto quando necessário.'
    },
    {
      label: 'Conflito de horário',
      value: c.conflito || '—',
      attention: (c.conflito || '') === 'Sim',
      flagNote: 'Possui outro compromisso fixo que pode gerar conflito de horário. Confirmar compatibilidade de escala.',
      okNote: 'Nenhum conflito de horário relatado.'
    }
  ];
}

function attentionCount(c) {
  return getAttentionItems(c).filter(i => i.attention).length;
}

function formatTimestamp(raw) {
  if (!raw) return '—';
  if (/^\d{2}\/\d{2}\/\d{4}/.test(raw)) return raw;
  const d = new Date(raw);
  return isNaN(d.getTime()) ? String(raw) : d.toLocaleString('pt-BR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
}

function parseVagas(raw) {
  if (!raw) return ['—'];
  return String(raw).split(',').map(v => v.trim()).filter(Boolean);
}

function formatDateOnly(raw) {
  if (!raw) return '—';
  const d = new Date(raw);
  if (isNaN(d.getTime())) return String(raw);
  // usa getters UTC pra não deslocar o dia por causa do fuso do navegador
  const dd = String(d.getUTCDate()).padStart(2, '0');
  const mm = String(d.getUTCMonth() + 1).padStart(2, '0');
  const yyyy = d.getUTCFullYear();
  return `${dd}/${mm}/${yyyy}`;
}

function initials(name) {
  const parts = (name || '').trim().split(/\s+/).filter(Boolean);
  if (parts.length === 0) return '?';
  if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
  return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
}

/* ---------- RENDER ---------- */
function render() {
  const content = document.getElementById('content');
  if (candidatos.length === 0) {
    content.innerHTML = `<div class="empty"><b>Nenhum candidato encontrado na planilha.</b><br/>Assim que houver cadastros pelo formulário, eles aparecerão aqui.</div>`;
    return;
  }

  const total = candidatos.length;
  const comAtencao = candidatos.filter(c => attentionCount(c) > 0).length;
  const semExperiencia = candidatos.filter(c => (c.experiencia || '') === 'Sem experiência').length;
  const vagaMap = {};
  candidatos.forEach(c => {
    parseVagas(c.vaga).forEach(v => { vagaMap[v] = (vagaMap[v] || 0) + 1; });
  });
  const vagaTop = Object.entries(vagaMap).sort((a, b) => b[1] - a[1])[0];

  content.innerHTML = `
    <div class="kpis">
      <div class="kpi"><div class="kpi-num">${total}</div><div class="kpi-label">Candidatos cadastrados</div></div>
      <div class="kpi flag"><div class="kpi-num">${comAtencao}</div><div class="kpi-label">Com pontos de atenção</div></div>
      <div class="kpi"><div class="kpi-num">${semExperiencia}</div><div class="kpi-label">Sem experiência prévia</div></div>
      <div class="kpi"><div class="kpi-num" style="font-size:1.3rem">${vagaTop ? vagaTop[0] : '—'}</div><div class="kpi-label">Vaga mais procurada</div></div>
    </div>

    <div class="toolbar">
      <input type="text" id="searchBox" placeholder="Buscar por nome..." oninput="currentQuery=this.value; renderCards();" />
      <select id="filterVaga" onchange="currentVagaFilter=this.value; renderCards();">
        <option value="">Todas as vagas</option>
      </select>
      <select id="filterRisk" onchange="currentRiskFilter=this.value; renderCards();">
        <option value="">Todos os candidatos</option>
        <option value="risk">Com pontos de atenção</option>
        <option value="clear">Sem pontos de atenção</option>
      </select>
      <select id="sortBy" onchange="currentSort=this.value; renderCards();">
        <option value="risk">Ordenar: mais pontos de atenção primeiro</option>
        <option value="recent">Ordenar: mais recentes primeiro</option>
        <option value="name">Ordenar: nome (A–Z)</option>
      </select>
    </div>

    <div class="card-grid" id="cardGrid"></div>
  `;

  const filterVaga = document.getElementById('filterVaga');
  Object.keys(vagaMap).sort().forEach(v => {
    const opt = document.createElement('option');
    opt.value = v; opt.textContent = v;
    filterVaga.appendChild(opt);
  });

  renderCards();
}

function renderCards() {
  const grid = document.getElementById('cardGrid');
  if (!grid) return;

  let list = candidatos.filter(c => {
    const matchesQuery = !currentQuery || (c.nome || '').toLowerCase().includes(currentQuery.toLowerCase());
    const matchesVaga = !currentVagaFilter || parseVagas(c.vaga).includes(currentVagaFilter);
    const count = attentionCount(c);
    const matchesRisk = !currentRiskFilter || (currentRiskFilter === 'risk' ? count > 0 : count === 0);
    return matchesQuery && matchesVaga && matchesRisk;
  });

  list = list.map(c => ({ c, n: attentionCount(c) }));
  if (currentSort === 'risk') list.sort((a, b) => b.n - a.n);
  else if (currentSort === 'name') list.sort((a, b) => (a.c.nome || '').localeCompare(b.c.nome || ''));
  // 'recent' mantém a ordem original (mais recentes geralmente no fim da planilha) — invertemos:
  else if (currentSort === 'recent') list.reverse();

  if (list.length === 0) {
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1">Nenhum candidato corresponde ao filtro.</div>`;
    return;
  }

  grid.innerHTML = list.map(({ c, n }, idx) => {
    const realIndex = candidatos.indexOf(c);
    const items = getAttentionItems(c);
    const flags = items.filter(i => i.attention);
    const chips = flags.slice(0, 3).map(f => `<span class="chip">${escapeHtml(f.label)}</span>`).join('');
    const extra = flags.length > 3 ? `<span class="chip">+${flags.length - 3}</span>` : '';
    const chipRow = flags.length > 0
      ? `<div class="chip-row">${chips}${extra}</div>`
      : `<div class="chip-row"><span class="chip ok">Nenhum ponto de atenção</span></div>`;

    return `
      <div class="ccard ${n > 0 ? 'risk' : ''}" onclick="openModal(${realIndex})">
        <div class="ccard-top">
          <div class="avatar">${escapeHtml(initials(c.nome))}</div>
          <div>
            <div class="ccard-name">${escapeHtml(c.nome || 'Sem nome')}</div>
            <div class="ccard-vaga">${escapeHtml(c.vaga || 'Vaga não informada')}</div>
          </div>
          <div class="risk-pill ${n > 0 ? 'high' : 'clear'}">${n > 0 ? n + ' ponto' + (n > 1 ? 's' : '') : 'Sem alertas'}</div>
        </div>
        <div class="ccard-meta">
          <span><b>${escapeHtml(c.cidade || '—')}</b> / ${escapeHtml(c.bairro || '—')} · ${escapeHtml(c.telefone || '—')}</span>
          <span>${escapeHtml(c.experiencia || '—')} de experiência</span>
        </div>
        ${chipRow}
      </div>
    `;
  }).join('');
}

/* ---------- MODAL ---------- */
function openModal(index) {
  const c = candidatos[index];
  if (!c) return;

  const items = getAttentionItems(c);
  const flagCount = items.filter(i => i.attention).length;

  document.getElementById('modalAvatar').textContent = initials(c.nome);
  document.getElementById('modalName').textContent = c.nome || 'Sem nome';
  document.getElementById('modalSub').textContent = `${c.vaga || 'Vaga não informada'} · Cadastrado em ${formatTimestamp(c.timestamp)}`;
  document.getElementById('modalBox').className = 'modal' + (flagCount > 0 ? ' risk' : '');

  const attnHtml = items.map(i => `
    <div class="attn-box ${i.attention ? 'flag' : 'safe'}">
      <div class="attn-icon">${i.attention ? '⚠️' : '✅'}</div>
      <div>
        <div class="attn-title">${escapeHtml(i.label)}: ${escapeHtml(i.value)}</div>
        <div class="attn-note">${escapeHtml(i.attention ? i.flagNote : i.okNote)}</div>
      </div>
    </div>
  `).join('');

  const motivoEscolhaTxt = c.motivoEscolha === 'Outro (descreva).' ? `Outro — ${c.motivoEscolhaOutro || ''}` : (c.motivoEscolha || '—');
  const carreira5anosTxt = c.carreira5anos === 'Outro.' ? `Outro — ${c.carreira5anosOutro || ''}` : (c.carreira5anos || '—');
  const motivacaoTrabalhoTxt = c.motivacaoTrabalho === 'Outro.' ? `Outro — ${c.motivacaoTrabalhoOutro || ''}` : (c.motivacaoTrabalho || '—');

  const body = `
    <div class="section-label">${flagCount > 0 ? flagCount + ' ponto(s) de atenção' : 'Pontos de atenção'}</div>
    ${attnHtml}

    <div class="section-label">Dados pessoais</div>
    <div class="info-grid">
      <div class="info-item"><div class="k">CPF</div><div class="v">${escapeHtml(c.cpf || '—')}</div></div>
      <div class="info-item"><div class="k">Nascimento</div><div class="v">${escapeHtml(formatDateOnly(c.nascimento))}</div></div>
      <div class="info-item"><div class="k">Telefone</div><div class="v">${escapeHtml(c.telefone || '—')}</div></div>
      <div class="info-item"><div class="k">E-mail</div><div class="v">${escapeHtml(c.email || '—')}</div></div>
      <div class="info-item"><div class="k">Cidade / Bairro</div><div class="v">${escapeHtml(c.cidade || '—')} / ${escapeHtml(c.bairro || '—')}</div></div>
      <div class="info-item"><div class="k">CNH</div><div class="v">${escapeHtml(c.cnh || '—')}</div></div>
    </div>

    <div class="section-label">Disponibilidade</div>
    <div class="info-grid">
      <div class="info-item full"><div class="k">Turnos disponíveis</div><div class="v">${escapeHtml(c.turnos || '—')}</div></div>
      <div class="info-item"><div class="k">Fins de semana</div><div class="v">${escapeHtml(c.fds || '—')}</div></div>
      <div class="info-item"><div class="k">Transporte</div><div class="v">${escapeHtml(c.transporte || '—')}</div></div>
    </div>

    <div class="section-label">Vaga pretendida</div>
    <div class="info-grid">
      <div class="info-item"><div class="k">Vaga</div><div class="v">${escapeHtml(c.vaga || '—')}</div></div>
      <div class="info-item"><div class="k">Experiência</div><div class="v">${escapeHtml(c.experiencia || '—')}</div></div>
      <div class="info-item"><div class="k">Certificado de vigilante</div><div class="v">${escapeHtml(c.certVigilante || '—')}</div></div>
      <div class="info-item"><div class="k">Registro PF</div><div class="v">${escapeHtml(c.regPF || '—')}</div></div>
      <div class="info-item"><div class="k">Último cargo</div><div class="v">${escapeHtml(c.ultimoCargo || '—')}</div></div>
    </div>

    <div class="section-label">Perfil e carreira</div>
    <div class="info-grid">
      <div class="info-item full"><div class="k">Por que escolheu ser vigilante</div><div class="v">${escapeHtml(motivoEscolhaTxt)}</div></div>
      <div class="info-item"><div class="k">Concurso p/ segurança pública</div><div class="v">${escapeHtml(c.concursoSegPublica || '—')}</div></div>
      <div class="info-item"><div class="k">Carreira em 5 anos</div><div class="v">${escapeHtml(carreira5anosTxt)}</div></div>
      <div class="info-item full"><div class="k">O que mais motiva no trabalho</div><div class="v">${escapeHtml(motivacaoTrabalhoTxt)}</div></div>
    </div>

    ${c.obs ? `
      <div class="section-label">Observações do candidato</div>
      <div class="obs-box">${escapeHtml(c.obs)}</div>
    ` : ''}
  `;

  document.getElementById('modalBody').innerHTML = body;
  document.getElementById('modalBackdrop').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalBackdrop').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
</script>
</body>
